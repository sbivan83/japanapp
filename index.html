<style>
  :root{
    --indigo:#1b2a4a; --indigo2:#24365c; --indigo-soft:#eef1f7;
    --red:#e4002b; --red-dark:#b80022; --gold:#c79a3e;
    --washi:#faf7f2; --card:#ffffff; --ink:#1c1d22; --muted:#6b7280;
    --line:#ece6da; --green:#1f9d55; --green-soft:#e7f5ec;
    --shadow:0 2px 10px rgba(27,42,74,.08); --shadow2:0 6px 22px rgba(27,42,74,.14);
    --r:18px; --nav-h:64px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--washi); color:var(--ink); font-size:17px; line-height:1.5;
    -webkit-font-smoothing:antialiased; padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
  }
  a{color:inherit}
  h1,h2,h3,h4{margin:0; line-height:1.25}
  .wrap{max-width:560px; margin:0 auto; padding:0 16px}

  /* ---------- App bar ---------- */
  .appbar{position:sticky; top:0; z-index:30; background:var(--indigo); color:#fff;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px; display:flex; align-items:center; gap:10px}
  .appbar .back{background:rgba(255,255,255,.16); border:0; color:#fff; width:38px; height:38px;
    border-radius:12px; font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer}
  .appbar h1{font-size:19px; font-weight:700; flex:1; letter-spacing:.2px}
  .appbar .jp{opacity:.7; font-size:13px; font-weight:500}

  /* ---------- Cards ---------- */
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r);
    box-shadow:var(--shadow); padding:16px; margin:14px 0}
  .card.tap{cursor:pointer; transition:transform .08s ease, box-shadow .15s}
  .card.tap:active{transform:scale(.985); box-shadow:var(--shadow2)}
  .sec-title{font-size:13px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); margin:22px 2px 4px}

  .itin-sec{background:var(--card); border:1px solid var(--line); border-radius:var(--r);
    box-shadow:var(--shadow); margin:14px 0; overflow:hidden}
  .itin-sec summary{padding:14px 16px; font-weight:700; font-size:15px; cursor:pointer; list-style:none;
    display:flex; align-items:center; gap:10px; color:var(--indigo)}
  .itin-sec summary::-webkit-details-marker{display:none}
  .itin-sec summary .chev{margin-left:auto; transition:transform .15s; color:var(--muted)}
  .itin-sec[open] summary .chev{transform:rotate(90deg)}
  .itin-sec .sbody{padding:0 16px 4px}
  .itin-sec .sbody .card{margin:8px 0}

  /* ---------- Pills / chips ---------- */
  .pill{display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700;
    padding:4px 10px; border-radius:999px; letter-spacing:.03em}
  .pill.hoy{background:var(--red); color:#fff}
  .pill.done{background:var(--green-soft); color:var(--green)}
  .pill.next{background:var(--indigo-soft); color:var(--indigo)}
  .pill.warn{background:#fdebcb; color:#9a6b00}
  .chip{display:inline-block; padding:8px 14px; border-radius:999px; border:1px solid var(--line);
    background:#fff; font-size:14px; font-weight:600; color:var(--indigo); cursor:pointer; white-space:nowrap}
  .chip.on{background:var(--indigo); color:#fff; border-color:var(--indigo)}
  .chiprow{display:flex; gap:8px; overflow-x:auto; padding:4px 2px 8px; -webkit-overflow-scrolling:touch}
  .chiprow::-webkit-scrollbar{display:none}

  /* ---------- Buttons ---------- */
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:48px;
    padding:12px 16px; border-radius:14px; border:0; font-size:16px; font-weight:700; cursor:pointer;
    text-decoration:none; width:100%}
  .btn.ghost{background:var(--indigo-soft); color:var(--indigo)}
  .btn.solid{background:var(--indigo); color:#fff}
  .btn.red{background:var(--red); color:#fff}
  .btn.line{background:#fff; border:1.5px solid var(--line); color:var(--indigo)}
  .btnrow{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px}
  .btnrow .btn{flex:1; min-width:130px}

  /* ---------- Hero / inicio ---------- */
  .hero{background:linear-gradient(135deg,var(--indigo),var(--indigo2) 60%,#33507f);
    color:#fff; padding:22px 16px 26px; border-radius:0 0 26px 26px; box-shadow:var(--shadow2)}
  .hero .hello{font-size:26px; font-weight:800; letter-spacing:.3px}
  .hero .konnichiwa{opacity:.85; font-size:15px; margin-top:2px}
  .hero .sun{font-size:13px; opacity:.8; margin-top:14px; background:rgba(255,255,255,.12);
    display:inline-block; padding:6px 12px; border-radius:999px}

  .today-card{background:#fff; border-radius:var(--r); box-shadow:var(--shadow2); padding:0; margin:-16px 0 0;
    overflow:hidden; border:1px solid var(--line)}
  .today-card .top{background:linear-gradient(135deg,var(--red),var(--red-dark)); color:#fff; padding:14px 16px}
  .today-card .top .lbl{font-size:12px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; opacity:.9}
  .today-card .top .ttl{font-size:21px; font-weight:800; margin-top:2px}
  .today-card .body{padding:14px 16px}
  .ico{width:1em; height:1em; display:inline-block; vertical-align:-.15em; stroke:currentColor; fill:none;
    stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round}
  .ico.solid{fill:currentColor; stroke:none}
  .kv{display:flex; gap:10px; align-items:flex-start; margin:7px 0; font-size:15px}
  .kv .ic{font-size:18px; width:24px; text-align:center; flex:none; color:var(--indigo)}
  .kv .tx{flex:1}
  .kv .tx b{font-weight:700}

  .count{font-size:40px; font-weight:800; color:var(--indigo); line-height:1}
  .count small{font-size:15px; font-weight:600; color:var(--muted)}

  /* ---------- Quick grid ---------- */
  .qgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:8px}
  .qgrid.three{grid-template-columns:repeat(3,1fr)}
  .qbtn{background:#fff; border:1px solid var(--line); border-radius:16px; padding:12px 6px; text-align:center;
    cursor:pointer; box-shadow:var(--shadow); text-decoration:none; color:var(--indigo); display:block}
  .qbtn .e{font-size:24px; display:block; margin-bottom:4px}
  .qbtn .t{font-size:12px; font-weight:700}
  .qbtn.sos{background:var(--red); color:#fff; border-color:var(--red)}

  /* ---------- Day list ---------- */
  .day-row{display:flex; align-items:center; gap:12px}
  .day-row .num{flex:none; width:48px; height:48px; border-radius:14px; background:var(--indigo-soft);
    color:var(--indigo); display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-weight:800; line-height:1}
  .day-row .num small{font-size:9px; font-weight:700; text-transform:uppercase; opacity:.7}
  .day-row .num b{font-size:18px}
  .day-row.is-hoy .num{background:var(--red); color:#fff}
  .day-row.is-done{opacity:.62}
  .day-row .meta{flex:1; min-width:0}
  .day-row .meta .c{font-size:12px; color:var(--muted); font-weight:600}
  .day-row .meta .t{font-size:16px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .day-row .ch{color:var(--muted); font-size:20px}

  /* ---------- Timeline (day detail) ---------- */
  .tl{position:relative; margin:6px 0 0 4px; padding-left:24px}
  .tl:before{content:""; position:absolute; left:6px; top:6px; bottom:6px; width:2px; background:var(--line)}
  .tl-item{position:relative; padding:0 0 16px}
  .tl-item:before{content:""; position:absolute; left:-24px; top:5px; width:12px; height:12px; border-radius:50%;
    background:#fff; border:3px solid var(--indigo)}
  .tl-item.t-now:before{border-color:var(--red)}
  .tl-time{font-size:13px; font-weight:800; color:var(--indigo); letter-spacing:.02em}
  .tl-ttl{font-size:16px; font-weight:700; margin-top:1px}
  .tl-ttl .e{margin-right:5px}
  .tl-desc{font-size:14px; color:var(--muted); margin-top:2px}
  .tl-cur{font-size:13px; color:#7a5a14; background:#fff8ef; border:1px solid #f0dcb8;
    border-radius:10px; padding:6px 9px; margin-top:6px; line-height:1.4}
  .tl-link{display:inline-flex; align-items:center; gap:5px; margin-top:6px; font-size:13px; font-weight:700;
    color:var(--indigo); background:var(--indigo-soft); padding:5px 10px; border-radius:10px; text-decoration:none}

  .note{background:#fff8ef; border:1px solid #f0dcb8; border-radius:14px; padding:10px 12px; font-size:14px;
    color:#7a5a14; margin:8px 0}
  .note b{color:#9a6b00}
  .base-line{display:flex; align-items:center; gap:10px; background:var(--indigo-soft); border-radius:14px;
    padding:10px 12px; font-size:15px; font-weight:600; color:var(--indigo); margin:12px 0 2px}

  /* ---------- Info rows ---------- */
  .info{display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); font-size:15px}
  .info:last-child{border-bottom:0}
  .info .l{color:var(--muted); width:120px; flex:none; font-weight:600}
  .info .v{flex:1; font-weight:600}
  .badge-soft{font-size:12px; font-weight:700; color:var(--muted); background:var(--washi); border:1px solid var(--line);
    padding:3px 8px; border-radius:8px; display:inline-block}

  /* ---------- Flight / route card ---------- */
  .route{display:flex; align-items:center; gap:10px; margin:6px 0}
  .route .pt{text-align:center; flex:1}
  .route .pt .h{font-size:22px; font-weight:800}
  .route .pt .c{font-size:12px; color:var(--muted); font-weight:700}
  .route .mid{flex:1.2; text-align:center; color:var(--indigo)}
  .route .mid .ln{border-top:2px dashed var(--line); position:relative; margin:10px 0 4px}
  .route .mid .ln:after{content:"✈"; position:absolute; top:-12px; left:50%; transform:translateX(-50%);
    background:var(--washi); padding:0 6px; font-size:15px}
  .route.train .mid .ln:after{content:"🚆"}
  .route.bus .mid .ln:after{content:"🚌"}
  .route .mid .d{font-size:11px; color:var(--muted); font-weight:700}

  /* ---------- Phrases ---------- */
  .ph{display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line)}
  .ph:last-child{border-bottom:0}
  .ph .txt{flex:1; min-width:0}
  .ph .es{font-size:15px; font-weight:700}
  .ph .jp{font-size:17px; margin-top:2px}
  .ph .ro{font-size:13px; color:var(--muted); font-style:italic}
  .ph .spk{flex:none; width:46px; height:46px; border-radius:50%; border:0; background:var(--indigo-soft);
    color:var(--indigo); font-size:20px; cursor:pointer}
  .ph .spk:active{background:var(--indigo); color:#fff}

  /* ---------- Checklist ---------- */
  .chk{display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--line); cursor:pointer}
  .chk:last-child{border-bottom:0}
  .chk .box{flex:none; width:26px; height:26px; border-radius:8px; border:2px solid var(--line); display:flex;
    align-items:center; justify-content:center; font-size:16px; color:#fff}
  .chk.on .box{background:var(--green); border-color:var(--green)}
  .chk.on .lab{color:var(--muted); text-decoration:line-through}
  .chk .lab{font-size:16px; font-weight:600}
  .progress{height:8px; background:var(--line); border-radius:99px; overflow:hidden; margin-top:6px}
  .progress > i{display:block; height:100%; background:var(--green); transition:width .25s}

  /* ---------- SOS ---------- */
  .sos-hero{background:linear-gradient(135deg,var(--red),var(--red-dark)); color:#fff; border-radius:var(--r);
    padding:18px; text-align:center; box-shadow:var(--shadow2)}
  .sos-hero .e{font-size:34px}
  .sos-hero h2{font-size:20px; margin:6px 0 2px}
  .sos-hero p{margin:0; opacity:.9; font-size:14px}
  .call-card{display:flex; align-items:center; gap:12px; background:#fff; border:1px solid var(--line);
    border-radius:16px; padding:12px 14px; margin:10px 0; box-shadow:var(--shadow)}
  .call-card .e{font-size:24px; width:30px; text-align:center}
  .call-card .info2{flex:1; min-width:0}
  .call-card .info2 .t{font-weight:800; font-size:15px}
  .call-card .info2 .s{font-size:13px; color:var(--muted)}
  .call-card .go{flex:none; background:var(--green); color:#fff; width:46px; height:46px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:20px; text-decoration:none}
  .call-card .go.mail{background:var(--indigo)}

  /* ---------- Map list ---------- */
  .map-pt{display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--line)}
  .map-pt:last-child{border-bottom:0}
  .map-pt .e{font-size:22px; width:30px; text-align:center}
  .map-pt .m{flex:1; min-width:0}
  .map-pt .m .t{font-weight:700; font-size:15px}
  .map-pt .m .c{font-size:12px; color:var(--muted); font-weight:600}
  .map-pt .open{flex:none; background:var(--indigo-soft); color:var(--indigo); border-radius:10px; padding:8px 10px;
    font-size:13px; font-weight:700; text-decoration:none}
  .fav{flex:none; font-size:20px; cursor:pointer; background:none; border:0; padding:4px}

  /* ---------- Converter ---------- */
  .conv input{font-size:24px; font-weight:800; border:1.5px solid var(--line); border-radius:12px; padding:10px 12px;
    width:100%; text-align:right; color:var(--indigo); background:#fff}
  .conv .lab{font-size:13px; color:var(--muted); font-weight:700; margin-bottom:4px}
  .conv .swap{display:flex; align-items:center; gap:10px}

  /* ---------- Bottom nav ---------- */
  .nav{position:fixed; left:0; right:0; bottom:0; z-index:40; background:#fff; border-top:1px solid var(--line);
    display:flex; height:var(--nav-h); padding-bottom:env(safe-area-inset-bottom)}
  .nav a{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    color:var(--muted); text-decoration:none; font-size:10px; font-weight:700}
  .nav a .e{font-size:19px}
  .nav a.on{color:var(--indigo)}
  .fab{position:fixed; right:16px; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px); z-index:45;
    width:60px; height:60px; border-radius:50%; background:var(--red); color:#fff; border:0; font-weight:800;
    box-shadow:0 6px 18px rgba(228,0,43,.45); cursor:pointer; font-size:12px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-decoration:none}
  .fab .e{font-size:20px}

  .muted{color:var(--muted)} .center{text-align:center} .small{font-size:13px}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .spacer{height:18px}

  /* ---------- Ilustraciones (SVG, offline) ---------- */
  .scene-card{background:#fff; border:1px solid var(--line); border-radius:var(--r); overflow:hidden;
    box-shadow:var(--shadow); margin:14px 0}
  .scene-wrap{position:relative}
  .scene{position:relative; width:100%; height:150px; overflow:hidden; background:#24365c}
  .scene svg{position:absolute; inset:0; width:100%; height:100%; display:block}
  .scene img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block}
  .scene.sm{height:104px} .scene.lg{height:172px}
  .scene-cap{position:absolute; left:0; right:0; bottom:0; padding:28px 14px 12px; color:#fff;
    background:linear-gradient(180deg,transparent,rgba(17,24,44,.82))}
  .scene-cap .c{font-size:12px; font-weight:700; opacity:.95; text-shadow:0 1px 3px rgba(0,0,0,.45)}
  .scene-cap .t{font-size:18px; font-weight:800; text-shadow:0 1px 4px rgba(0,0,0,.5); margin-top:1px}
  .ov-tl{position:absolute; top:10px; left:10px; display:flex; gap:6px}
  .ov-tr{position:absolute; top:10px; right:10px}
  .fav-img{background:rgba(255,255,255,.92); border:0; border-radius:50%; width:40px; height:40px;
    font-size:21px; color:var(--gold); box-shadow:var(--shadow); cursor:pointer}
  .pad{padding:14px}
</style>
</head>

function speak(txt){
  if(!("speechSynthesis"in window)){alert("Tu dispositivo no permite audio.");return;}
  try{
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(txt);u.lang="ja-JP";u.rate=.85;
    var vs=speechSynthesis.getVoices();
    for(var i=0;i<vs.length;i++){if(vs[i].lang&&vs[i].lang.indexOf("ja")===0){u.voice=vs[i];break;}}
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---------------- RENDER: ÚTILES ---------------- */

  out+='<div class="card" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between"><b>Progreso</b><span class="muted">'+hechos+'/'+total+'</span></div><div class="progress"><i style="width:'+pct+'%"></i></div></div>';

/* ---------------- ROUTER ---------------- */
var META={
 inicio:["Inicio","ホーム"], itinerario:["Itinerario","旅程"], dia:["Día","日"],
 vuelos:["Viaje y transporte","移動"], hoteles:["Hoteles","ホテル"], lugares:["Lugares","名所"],
 mapa:["Mapa","地図"], frases:["Frases útiles","会話"], sos:["SOS / Ayuda","緊急"],
 utiles:["Checklist antes del viaje","持ち物"], conversor:["Conversor ¥/€","両替"],
 mas:["Más","メニュー"], documentos:["Documentos","書類"]
};
function route(){
  var h=(location.hash||"#/inicio").replace(/^#\//,"");
  var parts=h.split("/"); var base=parts[0]||"inicio";
  var html, showBack=false;
  switch(base){
    case"inicio": html=vInicio(); break;
    case"itinerario": html=vItinerario(); break;
    case"dia": html=vDia(parts[1]); showBack=true; break;
    case"vuelos": html=vVuelos(); break;
    case"hoteles": html=vHoteles(); break;
    case"lugares": html=vLugares(); break;
    case"mapa": html=vMapa(); break;
    case"frases": html=vFrases(); break;
    case"sos": html=vSos(); break;
    case"utiles": html=vUtiles(); break;
    case"conversor": html=vConversor(); break;
    case"mas": html=vMas(); break;
    case"documentos": html=vDocumentos(); showBack=true; break;
    default: html=vInicio(); base="inicio";
  }
  var m=META[base]||["",""];
  barTitle.textContent = base==="dia" ? "Itinerario" : m[0];
  barJp.textContent = m[1];
  backBtn.style.display = showBack ? "flex" : "none";
  app.innerHTML=html;
  window.scrollTo(0,0);
  // nav active
  var links=document.querySelectorAll(".nav a");
  for(var i=0;i<links.length;i++){
    var nb=links[i].getAttribute("data-base");
    links[i].classList.toggle("on", nb===base || (base==="dia"&&nb==="itinerario"));
  }
  // bind converter inputs if present
  if(base==="conversor")bindConv();
}

function bindConv(){
  var eur=document.getElementById("cEur"), yen=document.getElementById("cYen"), rate=document.getElementById("cRate");
  if(!eur)return;
  function r(){return parseFloat(rate.value)||0;}
  eur.addEventListener("input",function(){yen.value=Math.round((parseFloat(eur.value)||0)*r());});
  yen.addEventListener("input",function(){var v=(parseFloat(yen.value)||0)/(r()||1);eur.value=Math.round(v*100)/100;});
  rate.addEventListener("input",function(){save("rate",r());yen.value=Math.round((parseFloat(eur.value)||0)*r());});
}

/* ---------------- EVENTOS GLOBALES ---------------- */
document.addEventListener("click",function(e){
  var t=e.target;
  // speak
  var sp=t.closest?t.closest("[data-say]"):null;
  if(sp){speak(sp.getAttribute("data-say"));return;}
  // fav
  var fv=t.closest?t.closest("[data-fav]"):null;
  if(fv){e.preventDefault();var id=fv.getAttribute("data-fav");var fav=store("fav",[]);var ix=fav.indexOf(id);
    if(ix<0)fav.push(id);else fav.splice(ix,1);save("fav",fav);route();return;}
  // checklist
  var ck=t.closest?t.closest("[data-check]"):null;
  if(ck){var key=ck.getAttribute("data-check");var c=store("chk",{});c[key]=!c[key];save("chk",c);route();return;}
  // day done toggle
  var dn=t.closest?t.closest("[data-done]"):null;
  if(dn){var did=dn.getAttribute("data-done");var d=store("done",{});d[did]=!d[did];save("done",d);route();return;}
  // lugares filtro
  var lg=t.closest?t.closest("[data-lug]"):null;
  if(lg){lugFiltro=lg.getAttribute("data-lug");route();return;}
  // mapa filtro
  var mp=t.closest?t.closest("[data-map]"):null;
  if(mp){mapFiltro=mp.getAttribute("data-map");route();return;}
});
backBtn.addEventListener("click",function(){
  if(history.length>1)history.back(); else location.hash="#/itinerario";
});
window.addEventListener("hashchange",route);
// Las imágenes se cargan en un <script> posterior; cuando estén, re-renderizamos.
window.__applyImages=function(){ try{ route(); }catch(e){} };
if(!location.hash)location.hash="#/inicio";
route();
})();
</script>
